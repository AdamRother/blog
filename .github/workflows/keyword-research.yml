name: Weekly Keyword Research

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of each month at 8am Prague (CEST = UTC+2)
  workflow_dispatch:      # allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.email "joshforti@users.noreply.github.com"
          git config user.name "CI Research Agent"

      - name: Run keyword research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print "/keyword-research" \
            --allowedTools "Read,Write,Edit,Bash,Grep,WebSearch,WebFetch"

      - name: Commit and push
        run: |
          git add references/client-intelligence-keywords-only.md
          if git diff --staged --quiet; then
            echo "No new keywords added — nothing to commit."
            exit 0
          fi
          git commit \
            -m "research: add keyword candidates $(date +%Y-%m-%d)" \
            -m "Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
          git push origin main
