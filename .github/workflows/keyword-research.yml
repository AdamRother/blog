name: Weekly Keyword Research

on:
  schedule:
    - cron: '0 7 * * 1'  # Monday 9am Prague (CEST = UTC+2)
  workflow_dispatch:      # allows manual trigger from GitHub Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.email "joshforti@users.noreply.github.com"
          git config user.name "CI Research Agent"

      - name: Create research branch
        run: |
          BRANCH="keywords/research-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run keyword research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print "/keyword-research" \
            --allowedTools "Read,Write,Edit,Bash,Grep,WebSearch,WebFetch"

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet references/client-intelligence-keywords-only.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new keywords were added — nothing to PR."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New keywords detected."
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git add references/client-intelligence-keywords-only.md
          git commit \
            -m "research: add keyword candidates $(date +%Y-%m-%d)" \
            -m "Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
          git push origin "${{ env.BRANCH }}"

      - name: Create pull request
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > /tmp/pr-body.md << 'PREOF'
## New keyword candidates for review

Review the diff in `references/client-intelligence-keywords-only.md`. Each keyword was validated against CI's ICP and checked against published posts for uniqueness.

**To review:**
1. Open the **Files changed** tab
2. Delete any keywords that don't fit CI's voice or positioning
3. Merge — the daily blog workflow picks them up automatically

Full research log (sources checked, searches run) is in the Actions run that generated this PR.

---
*Auto-generated by the weekly keyword research workflow*
PREOF
          gh pr create \
            --title "Keyword research: new candidates $(date +%Y-%m-%d)" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "${{ env.BRANCH }}" \
          || echo "Note: PR may already exist for this branch — skipping creation."
