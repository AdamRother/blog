name: Daily Blog Post

on:
  schedule:
    - cron: '0 7 * * *'  # 9am Prague (CEST = UTC+2)
  workflow_dispatch:      # allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.email "ai@joshforti.com"
          git config user.name "CI Blog Agent"

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXEL_API: ${{ secrets.PEXELS_API_KEY }}
        run: |
          claude --print "/blog" \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"

      - name: Commit and push
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No new post generated"
            exit 0
          fi
          git commit -m "Add post: scheduled daily post" -m "Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
          git push origin main
